<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Power Snitch" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ request.url_for('static', path='css/app.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/dashboard">Power Snitch</a>
      {% if user %}
      <div class="navbar-nav me-auto">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/devices">UPS</a>
        <a class="nav-link" href="/services">Services</a>
        <a class="nav-link" href="/channels">Channels</a>
        <a class="nav-link" href="/rules">Rules</a>
        <a class="nav-link" href="/history">History</a>
        <a class="nav-link" href="/graphs">Graphs</a>
        <a class="nav-link" href="/diagnostics">Diagnostics</a>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <span class="text-light small">Bind: {{ bind_mode }}</span>
        <a class="btn btn-sm btn-outline-light" href="/settings/password">Password</a>
        <form method="post" action="/logout">
          <button class="btn btn-sm btn-light" type="submit">Log out</button>
        </form>
      </div>
      {% endif %}
    </div>
  </nav>
  <main class="container py-4">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
