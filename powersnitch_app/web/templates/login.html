{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="panel p-4">
      <h1 class="hero-title mb-2">Local UPS Monitoring</h1>
      <p class="muted">Sign in with the local admin account to manage discovery, alerts, and telemetry.</p>
      <form method="post" action="/login" class="mt-4">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" value="admin" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
